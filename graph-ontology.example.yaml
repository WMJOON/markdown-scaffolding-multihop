# graph-ontology.yaml
# OWL 스타일 단일 진실 소스 (Single Source of Truth)
# 이 파일 하나로 graph-config.yaml + rollup-config.yaml을 자동 도출한다.
#
# 사용:
#   python3 skills/md-frontmatter-rollup/scripts/rollup_engine.py --ontology graph-ontology.yaml
#   python3 skills/md-graph-multihop/scripts/graph_builder.py --config graph-config.yaml
#
# 단계:
#   1. 이 파일을 graph-ontology.yaml로 복사하고 프로젝트에 맞게 수정
#   2. rollup_engine.py --ontology graph-ontology.yaml 실행
#      → entity_dirs + scalar_node_attrs를 도출해 그래프 구축
#   3. graph-config.yaml이 필요하면 scaffold_project.py로 별도 생성 가능

# ── 네임스페이스 (선택 — 문서화 목적) ────────────────────────────
namespace: "http://example.org/knowledge-graph#"

# ── 클래스 (Entity 타입) ──────────────────────────────────────────
# entity_dir: graph_builder가 md 파일을 읽을 디렉토리 (base_dir 기준 상대경로)
classes:
  Industry:
    label: 산업
    entity_dir: data/industry-entities
    description: 산업/시장 분류 노드

  Segment:
    label: 세그먼트
    entity_dir: data/segment-entities
    description: 산업 하위 세그먼트

  Competitor:
    label: 경쟁사
    entity_dir: data/competitor-entities
    description: 경쟁사 엔티티

  Insight:
    label: 인사이트
    entity_dir: insights
    description: Claude 멀티홉 추론 결과 저장 노드

# ── Object Properties (엣지 / 관계) ───────────────────────────────
# relation_name: 그래프 엣지에 기록되는 relation 식별자
# domain / range: 관계의 주체 / 대상 클래스
# rollup: 이 relation을 따라 집계할 규칙 목록
object_properties:
  hasSegment:
    label: 세그먼트 포함
    domain: Industry
    range: Segment
    relation_name: has_segment
    rollup:
      - field: market_size
        func: sum
        write_to: market_size
        updated_at_field: market_size_updated_at
      - field: callbot_adoption_rate
        func: weighted_avg
        weight_field: market_size
        write_to: callbot_adoption_rate

  targetsIndustry:
    label: 목표 산업
    domain: Competitor
    range: Industry
    relation_name: targets_industry
    # rollup 없음 — 조회/추론용 관계

  relatedTo:
    label: 관련
    domain: Insight
    range: Insight
    relation_name: related_to

# ── Datatype Properties (노드 스칼라 속성) ───────────────────────
# 여기 선언된 필드는 scalar_node_attrs에 자동 포함됨
datatype_properties:
  name:
    label: 이름
    domain: [Industry, Segment, Competitor, Insight]
    range: xsd:string

  marketSize:
    label: 시장 규모 (억원)
    domain: [Industry, Segment]
    range: xsd:float

  callbotAdoptionRate:
    label: 콜봇 도입률 (%)
    domain: [Industry, Segment]
    range: xsd:float

  threatLevel:
    label: 위협 수준 (1~5)
    domain: Competitor
    range: xsd:integer

  status:
    label: 상태
    domain: [Industry, Competitor, Insight]
    range: xsd:string

  tags:
    label: 태그
    domain: [Insight]
    range: xsd:string

# ── 추가 scalar_node_attrs (datatype_properties 외 필드) ─────────
scalar_node_attrs:
  - title
  - date
  - author

# ══════════════════════════════════════════════════════════════════
# Categorical Morphism Extension (선택)
# ══════════════════════════════════════════════════════════════════
# 이 섹션이 존재하면 graph_builder가 합성 추론을 자동 수행한다.
# 없으면 기존 방식(단순 typed edge)으로 동작한다.
#
# 범주 C = (Ob, Hom, ∘, id) 구조:
#   - Ob(C): classes에 정의된 엔티티 = 객체
#   - Hom(C): object_properties 중 morphism_type: categorical인 관계 = 사상
#   - ∘: composition_table에 따른 사상 합성 법칙
#   - id: 각 객체의 자기 일관성 조건 (항등 사상)

# ── 사상 유형 정의 ──────────────────────────────────────────────
# 각 morphism type의 의미론적 계약 (precondition → postcondition)
morphism_types:
  causes:
    description: "F_i의 상태 변화가 F_j를 유발"
    transitive: true
    precondition: "F_i에서 임계값 초과 또는 상태 전이 발생"
    postcondition: "F_j의 Action/Trigger가 활성화됨"

  requires:
    description: "F_j 분석에 F_i의 출력이 선행 입력으로 필요"
    transitive: true
    precondition: "F_i의 출력이 생성 완료됨"
    postcondition: "F_j가 실행 가능 상태가 됨"

  constrains:
    description: "F_i가 F_j의 선택지 또는 실행 조건을 제한"
    transitive: true
    precondition: "F_i의 규칙/임계값이 정의됨"
    postcondition: "F_j의 파라미터 범위 또는 실행 시점이 제한됨"

  informs:
    description: "F_i 결과가 F_j 해석에 맥락 제공"
    transitive: true
    precondition: "F_i의 분석 결과가 존재"
    postcondition: "F_j의 해석 정확도 또는 초점이 개선됨"

  contrasts_with:
    description: "대립적 관점 제공 (양방향, 비추이적)"
    transitive: false
    precondition: "두 프레임워크가 동일 대상을 다른 축에서 분석"
    postcondition: "다관점 분석(multi-perspective analysis) 가능"

# ── 합성 테이블 ─────────────────────────────────────────────────
# g ∘ f: f를 먼저 적용 후 g를 적용
# 행 = f (첫 번째 사상), 열 순서 = [causes, requires, constrains, informs]
# contrasts_with는 비추이적 → 합성 불가
composition_table:
  causes:     [causes,     causes,     causes,     informs]
  requires:   [requires,   requires,   constrains, requires]
  constrains: [constrains, constrains, constrains, constrains]
  informs:    [informs,    informs,    informs,    informs]

# ── 사용 예 ─────────────────────────────────────────────────────
# object_properties에 morphism_type: categorical을 추가하면
# graph_builder가 해당 relation을 categorical morphism으로 인식한다.
#
# 예:
#   requires:
#     domain: Technique
#     range: Technique
#     relation_name: requires
#     morphism_type: categorical    # ← 이 필드가 핵심
#     transitive: true
#
# graph_builder --config ... 실행 시 자동으로:
#   1. categorical 엣지만 필터링
#   2. composition_table에 따라 2-hop/3-hop 합성 엣지 생성
#   3. 합성 엣지에 inferred=true, via="A→B→C", composition="f_type ∘ g_type" 메타데이터 추가
